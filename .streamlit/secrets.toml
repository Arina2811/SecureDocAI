# Streamlit Secrets Configuration (for local development & Streamlit Cloud)
# In Streamlit Cloud, set these as repository secrets via:
# https://docs.streamlit.io/deploy/streamlit-cloud/deploy-your-app#add-secrets

# Google Gemini API
GEMINI_API_KEY = "your-gemini-api-key-here"
GEMINI_MODEL = "gemini-2.0-flash"
GEMINI_TEMPERATURE = "0.3"
GEMINI_MAX_TOKENS = "4096"

# OpenAI (optional fallback)
OPENAI_API_KEY = "your-openai-api-key-here"
OPENAI_MODEL = "gpt-4o-mini"

# File upload constraints
MAX_FILE_SIZE_MB = "50"

# Logging
LOG_LEVEL = "INFO"
